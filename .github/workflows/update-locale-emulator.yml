name: Update Locale Emulator DLLs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dlls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Third Party Directory
        run: mkdir -p third_party/LocaleEmulator

      - name: Download and Extract Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo xupefei/Locale-Emulator --pattern "*.zip" --output release.zip
          
          unzip -j release.zip "*/LoaderDLL.dll" "*/LocaleEmulator.dll" -d third_party/LocaleEmulator/

      - name: Download License Files
        run: |
          curl -L https://raw.githubusercontent.com/xupefei/Locale-Emulator/refs/heads/master/COPYING -o third_party/LocaleEmulator/COPYING
          curl -L https://raw.githubusercontent.com/xupefei/Locale-Emulator/refs/heads/master/COPYING.LESSER -o third_party/LocaleEmulator/COPYING.LESSER

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add third_party/LocaleEmulator/

          if git diff --staged --quiet; then
            echo "No new DLLs found. Skipping commit."
          else
            git commit -m "chore: Update Locale Emulator DLLs to latest release"
            git push
          fi