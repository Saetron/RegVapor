name: Validate Source Registry Files

on:
  pull_request:
    branches:
      - main
    paths:
      - 'registry_src/**' # Triggers when files inside your source directory change

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Run Source Validator Script
      run: |
        python .github/scripts/validate_json.py